name: Reusable Build

on:
  workflow_call:
    inputs:
      package_zip:
        required: false
        type: boolean
        default: false
      run_smoke_test:
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  test:
    name: Vet & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -count=1 ./...

  build:
    name: Build (${{ matrix.target_name }})
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target_name: linux-x64
            goos: linux
            goarch: amd64
            binary_name: sub2socks5-linux-x64
            archive_name: sub2socks5-linux-x64.zip
          - runner: ubuntu-24.04-arm
            target_name: linux-arm64
            goos: linux
            goarch: arm64
            binary_name: sub2socks5-linux-arm64
            archive_name: sub2socks5-linux-arm64.zip
          - runner: windows-latest
            target_name: windows-x64
            goos: windows
            goarch: amd64
            binary_name: sub2socks5-windows-x64.exe
            archive_name: sub2socks5-windows-x64.zip
          - runner: windows-11-arm
            target_name: windows-arm64
            goos: windows
            goarch: arm64
            binary_name: sub2socks5-windows-arm64.exe
            archive_name: sub2socks5-windows-arm64.zip
          - runner: macos-15-intel
            target_name: macos-x64
            goos: darwin
            goarch: amd64
            binary_name: sub2socks5-macos-x64
            archive_name: sub2socks5-macos-x64.zip
          - runner: macos-latest
            target_name: macos-arm64
            goos: darwin
            goarch: arm64
            binary_name: sub2socks5-macos-arm64
            archive_name: sub2socks5-macos-arm64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Prepare output directory
        shell: bash
        run: mkdir -p dist

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags "-s -w" -o dist/${{ matrix.binary_name }} .

      - name: Smoke test embedded static (Windows)
        if: inputs.run_smoke_test && runner.os == 'Windows'
        shell: pwsh
        run: |
          $p = Start-Process -FilePath "dist/${{ matrix.binary_name }}" -PassThru
          Start-Sleep -Seconds 2
          try {
            $resp = Invoke-WebRequest -Uri "http://127.0.0.1:18080/" -UseBasicParsing -TimeoutSec 10
            if ($resp.StatusCode -ne 200) {
              throw "Unexpected status code: $($resp.StatusCode)"
            }
          } finally {
            if ($p -and !$p.HasExited) {
              Stop-Process -Id $p.Id -Force
            }
          }

      - name: Smoke test embedded static (Linux/macOS)
        if: inputs.run_smoke_test && runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x "dist/${{ matrix.binary_name }}"
          "dist/${{ matrix.binary_name }}" >/tmp/sub2socks5.log 2>&1 &
          APP_PID=$!
          sleep 2
          curl -fsS "http://127.0.0.1:18080/" >/dev/null
          kill "$APP_PID" || true

      - name: Package artifact (Windows)
        if: inputs.package_zip && runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/${{ matrix.binary_name }} -DestinationPath dist/${{ matrix.archive_name }} -Force

      - name: Package artifact (Linux/macOS)
        if: inputs.package_zip && runner.os != 'Windows'
        shell: bash
        run: |
          cd dist
          zip -j "${{ matrix.archive_name }}" "${{ matrix.binary_name }}"

      - name: Archive build output
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target_name }}
          path: ${{ inputs.package_zip && format('dist/{0}', matrix.archive_name) || format('dist/{0}', matrix.binary_name) }}
          if-no-files-found: error
