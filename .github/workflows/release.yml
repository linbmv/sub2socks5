name: Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version (example: v1.0.0)"
        required: true

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/reusable-build.yml
    with:
      package_zip: true

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.release_version }}"
          VERSION="$(echo "$VERSION" | tr -d '[:space:]')"
          if [ -z "$VERSION" ]; then
            echo "release_version is required"
            exit 1
          fi
          TAG="$VERSION"
          NAME="sub2socks5 $VERSION"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Collect archives
        shell: bash
        run: |
          mkdir -p release-upload
          find release-assets -type f -name "*.zip" -exec cp {} release-upload/ \;
          ls -la release-upload

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          append_body: false
          make_latest: true
          generate_release_notes: false
          files: release-upload/*.zip
