<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - sub2socks5</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="login-shell">
    <div class="login-card">
      <h1 class="login-title">sub2socks5</h1>
      <p class="login-sub">请输入访问 Token</p>
      <form id="login-form" autocomplete="off">
        <label class="login-field">
          <span>Token</span>
          <input id="login-token" type="password" autocomplete="current-password" placeholder="SUB2SOCKS5_AUTH_TOKEN 环境变量值" required />
        </label>
        <div id="login-error" class="login-error is-hidden"></div>
        <button id="login-submit" type="submit">登录</button>
      </form>
      <p class="login-tip">Token 由部署方在 compose 的 <code>SUB2SOCKS5_AUTH_TOKEN</code> 环境变量配置。忘记 Token 请联系管理员。</p>
    </div>
  </main>
  <script type="module" src="/login.js"></script>
</body>
</html>
