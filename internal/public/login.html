<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - sub2socks5</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%234f46e5'/%3E%3Ctext x='32' y='44' font-size='36' font-family='monospace' font-weight='700' text-anchor='middle' fill='white'%3ES5%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="login-shell">
    <div class="login-card">
      <h1 class="login-title">sub2socks5</h1>
      <p class="login-sub">请输入用户名和密码</p>
      <form id="login-form" autocomplete="on">
        <label class="login-field">
          <span>用户名</span>
          <input id="login-username" type="text" autocomplete="username" placeholder="SUB2SOCKS5_USERNAME（默认 admin）" required />
        </label>
        <label class="login-field">
          <span>密码</span>
          <input id="login-password" type="password" autocomplete="current-password" placeholder="SUB2SOCKS5_PASSWORD 环境变量值" required />
        </label>
        <div id="login-error" class="login-error is-hidden"></div>
        <button id="login-submit" type="submit">登录</button>
      </form>
      <p class="login-tip">用户名 / 密码由部署方在 compose 的 <code>SUB2SOCKS5_USERNAME</code> 和 <code>SUB2SOCKS5_PASSWORD</code> 环境变量配置。忘记凭据请联系管理员。</p>
    </div>
  </main>
  <script type="module" src="/login.js"></script>
</body>
</html>
