<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>节点管理 - sub2socks5</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="layout-shell">
    <aside class="sidebar">
      <div class="sidebar-logo">sub2socks5</div>
      <nav class="sidebar-nav">
        <a href="/#home" class="nav-item">首页</a>
        <a href="/nodes.html" class="nav-item is-active">节点管理</a>
        <a href="/#dns" class="nav-item">基础与 DNS</a>
        <a href="/#kernel" class="nav-item">内核管理</a>
        <a href="/#scheduler" class="nav-item">订阅调度</a>
        <a href="/#logs" class="nav-item">实时日志</a>
        <a href="/#json" class="nav-item">JSON 模式</a>
        <a href="/#about" class="nav-item">关于</a>
      </nav>
    </aside>

    <main class="content">
      <header class="content-header">
        <h1 id="page-title">节点管理</h1>
      </header>

      <div class="content-body">
        <section>
          <div class="section-heading">
            <h2>操作</h2>
            <div class="section-heading-actions">
              <button id="back-home" type="button">返回主页</button>
              <button id="save-nodes" type="button">保存节点配置</button>
            </div>
          </div>
          <div id="node-status" class="status-bar is-idle">准备就绪</div>
        </section>

        <section>
          <div class="section-heading">
            <h2>节点组</h2>
            <div class="section-heading-actions">
              <button id="toggle-groups-section" type="button">收起</button>
              <button id="add-group" type="button">添加节点组</button>
            </div>
          </div>
          <div id="groups-section-body">
            <div id="groups" class="timeline"></div>
          </div>
        </section>

        <section>
          <div class="section-heading">
            <h2>链式代理</h2>
            <div class="section-heading-actions">
              <button id="toggle-chains-section" type="button">收起</button>
              <button id="add-chain" type="button">添加链式代理</button>
            </div>
          </div>
          <div id="chains-section-body">
            <div id="chains" class="timeline"></div>
          </div>
        </section>

        <section>
          <div class="section-heading">
            <h2>现有节点</h2>
            <div class="section-heading-actions">
              <button id="check-all-nodes" type="button" class="icon-button" title="刷新所有节点测速">↻</button>
              <button id="open-node-editor" type="button">编辑</button>
            </div>
          </div>
          <div id="available-node-list" class="node-pill-grid"></div>
        </section>
      </div>
    </main>
  </div>

  <div id="bulk-add-overlay" class="overlay is-hidden" aria-hidden="true">
    <div class="overlay-card">
      <h3>批量添加成员</h3>
      <p class="form-note" id="bulk-add-target" style="margin:0 0 12px"></p>
      <div class="tab-bar" style="margin-bottom:12px;">
        <button id="bulk-add-mode-keyword" type="button" class="tab-button is-active">关键词包含</button>
        <button id="bulk-add-mode-regex" type="button" class="tab-button">正则表达式</button>
      </div>
      <label style="display:block;margin-bottom:10px;">
        <span style="display:block;margin-bottom:4px;color:var(--text-muted);font-size:13px;">表达式</span>
        <input id="bulk-add-pattern" type="text" placeholder="例：香港 或 (HK|香港)" style="width:100%;" />
      </label>
      <label style="display:flex;align-items:center;gap:8px;margin-bottom:10px;color:var(--text-muted);font-size:13px;">
        <input id="bulk-add-case-insensitive" type="checkbox" checked />
        忽略大小写
      </label>
      <div id="bulk-add-preview-summary" class="form-note" style="margin:0 0 8px;">输入表达式以预览匹配结果</div>
      <div id="bulk-add-preview" class="node-pill-grid" style="max-height:240px;overflow-y:auto;"></div>
      <div class="overlay-actions" style="margin-top:12px;gap:10px;">
        <button id="bulk-add-replace" type="button">替换成员</button>
        <button id="bulk-add-append" type="button">追加到现有成员</button>
        <button id="bulk-add-cancel" type="button" class="danger-icon-button">取消</button>
      </div>
    </div>
  </div>
  <script type="module" src="/nodes.js"></script>
</body>
</html>
