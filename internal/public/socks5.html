<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOCKS5 服务 - sub2socks5</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="container">
    <div id="toast-container" style="position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;display:none;align-items:center;gap:8px;padding:12px 20px;border-radius:10px;background:#fff;box-shadow:0 4px 16px rgba(0,0,0,0.15);font-size:15px;font-weight:500;pointer-events:none"></div>
    <section>
      <div class="section-heading">
        <h1>SOCKS5 服务</h1>
        <div class="section-heading-actions">
          <button id="back-home" type="button">返回主页</button>
          <button id="save-socks" type="button">保存配置</button>
        </div>
      </div>
      <div id="socks-status" class="status-bar is-idle">准备就绪</div>
    </section>

    <section>
      <div class="section-heading">
        <h2>服务列表 <span id="service-count-badge" class="editor-status" style="font-size:13px;font-weight:400">0 个服务</span> <span id="unsaved-badge" class="editor-status is-dirty" style="font-size:13px;font-weight:400;display:none">0 个服务未保存</span></h2>
        <div class="section-heading-actions">
          <button id="clear-socks" type="button" style="background:#ef4444">删除所有 SOCKS5 服务</button>
          <button id="add-socks" type="button">+ 添加 SOCKS5 服务</button>
        </div>
      </div>
      <div id="socks-list"></div>
    </section>
  </main>
  <script type="module" src="/socks5.js"></script>
</body>
</html>
