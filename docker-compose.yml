services:
  sub2socks5:
    # 默认本地构建。若已发布到 GHCR，可注释 build 段并改用：
    #   image: ghcr.io/sglinhome/sub2socks5:latest
    build:
      context: .
    image: sub2socks5:local
    container_name: sub2socks5
    restart: unless-stopped
    # init 用于回收 sing-box 子进程，避免僵尸进程。
    init: true
    environment:
      TZ: Asia/Shanghai
      # 容器内 Web UI 监听地址。Docker bridge 模式下必须 0.0.0.0，否则端口映射不通。
      SUB2SOCKS5_HOST: "0.0.0.0"
      # 可选：在 Web UI 顶部显示部署模式横幅。格式 "level|message"，level 取 info/warning。
      # SUB2SOCKS5_DEPLOYMENT_HINT: "info|当前为 Docker bridge 部署，SOCKS5 监听必须使用 0.0.0.0。"
      # ===== 必填（公网/CF 反代场景）=====
      # Web UI 鉴权 Token。生成: openssl rand -base64 32
      # SUB2SOCKS5_AUTH_TOKEN: "请替换为高熵随机字符串"
      # 仅在启用鉴权后生效。允许通过指定 Host 头访问 Web UI（防 DNS rebinding）。
      # 多个用逗号分隔；不含端口；默认已包含 localhost / 127.0.0.1 / ::1。
      # CF 反代场景填回源域名: "your-domain.example.com"
      # SUB2SOCKS5_ALLOWED_HOSTS: "your-domain.example.com,192.168.1.10"
      # 可选：导出 SOCKS5 时把监听 0.0.0.0 替换为外部地址。
      # SUB2SOCKS5_EXTERNAL_HOST: "your-vps.example.com"
    ports:
      # === 部署模式选择 ===
      # 模式 A 仅本机访问（默认）：保留 127.0.0.1: 前缀
      # 模式 B LAN 共享：必须先设 AUTH_TOKEN + ALLOWED_HOSTS，再去掉 127.0.0.1: 前缀
      # 模式 C CF 反代到公网：必须先设 AUTH_TOKEN + ALLOWED_HOSTS=回源域名
      #        反代到 18080；CF 设 SSL/TLS = Full；CF 会自动加 X-Forwarded-Proto=https
      #        从而触发 cookie Secure 标志，避免凭据明文回传
      - "127.0.0.1:18080:18080"
      # SOCKS5 端口。开放给外部使用必须在 Web UI 给每个端口配置 username/password 鉴权用户。
      # 建议：用 firewall/security group 进一步限制来源 IP。
      - "18081-18100:18081-18100"
    volumes:
      - ./data:/app/internal/data
      - ./runtime:/app/internal/runtime
      # 阶段二镜像已内置 sing-box，entrypoint 会在 bin 目录为空时 seed 默认版本。
      - ./bin:/app/internal/bin
