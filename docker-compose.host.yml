# ⚠️ host 模式安全警告：
# host 网络下端口直接进入 VPS 网络命名空间。Web UI 通过环境变量强制只监听 127.0.0.1，
# 远程访问必须使用 SSH 隧道。SOCKS5 端口由用户在 Web UI 中按需配置 0.0.0.0 暴露，
# 配合防火墙/安全组白名单限定来源。详见 README "host 模式" 章节。
services:
  sub2socks5:
    # 默认本地构建。若已发布到 GHCR，可注释 build 段并改用：
    #   image: ghcr.io/sglinhome/sub2socks5:latest
    build:
      context: .
    image: sub2socks5:local
    container_name: sub2socks5
    restart: unless-stopped
    # init 用于回收 sing-box 子进程，避免僵尸进程。
    init: true
    # host 模式直接复用宿主机网络命名空间。
    network_mode: host
    environment:
      TZ: Asia/Shanghai
      # 强制 Web UI 只监听 loopback，避免无认证管理面被公网访问。
      # 启用反向代理或确认防火墙可控时再改回 0.0.0.0。
      SUB2SOCKS5_HOST: "127.0.0.1"
      # 可选：在 Web UI 顶部显示部署模式横幅。格式 "level|message"，level 取 info/warning。
      # SUB2SOCKS5_DEPLOYMENT_HINT: "warning|host 模式：Web UI 仅监听 127.0.0.1，远程访问请使用 SSH 隧道。"
      # 强烈建议：启用 Web UI 鉴权（任意人可改订阅/出口节点 → 你的流量被劫持）。
      # 高熵随机字符串生成: openssl rand -base64 32
      # SUB2SOCKS5_AUTH_TOKEN: "请替换为高熵随机字符串"
      # 仅在启用鉴权后生效。允许通过 LAN IP / 域名访问 Web UI（防 DNS rebinding 白名单）。
      # 多个用逗号分隔；不含端口；默认已包含 localhost / 127.0.0.1 / ::1。
      # SUB2SOCKS5_ALLOWED_HOSTS: "vps.example.com"
      # 可选：导出 SOCKS5 时把监听 0.0.0.0 替换为外部地址。
      # SUB2SOCKS5_EXTERNAL_HOST: "vps.example.com"
    volumes:
      - ./data:/app/internal/data
      - ./runtime:/app/internal/runtime
      # 阶段二镜像已内置 sing-box，entrypoint 会在 bin 目录为空时 seed 默认版本。
      - ./bin:/app/internal/bin
